[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio support
asyncio_mode = auto

# Output options
addopts =
    -v
    --strict-markers
    --tb=short

# Custom markers
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (require Neo4j, LLM services)
    e2e: End-to-end tests (full application flow)
    slow: Tests that take significant time to run

# Environment
env =
    PYTHONPATH=.
